<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI看球外挂</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="AI看球外挂首页">
        <span class="brand-ball">⚽</span>
        <span>AI看球外挂</span>
      </a>
    </header>

    <main>
      <section class="workspace">
        <div class="main-column">
          <section class="hero">
            <div class="hero-copy">
              <p class="eyebrow">2026 世界杯轻松看懂指南</p>
              <h1>不懂球，<br />也能轻松看懂<span>世界杯</span></h1>
              <p class="hero-text">
                已补上 6 月 12 日到 6 月 23 日的赛程：看点、必认球员、聊天金句、赛后朋友圈，一键切换。
              </p>
            </div>
          </section>

          <section class="result-grid" id="result" aria-live="polite">
            <article class="result-card">
              <div class="card-head">
                <span class="number">01</span>
                <h3>这场为什么值得看</h3>
                <span class="icon">🏆</span>
              </div>
              <ul id="reasons"></ul>
            </article>

            <article class="result-card">
              <div class="card-head">
                <span class="number">02</span>
                <h3>必须认识的 3 个球员</h3>
                <span class="icon">⭐</span>
              </div>
              <div class="players" id="players"></div>
            </article>

            <article class="result-card">
              <div class="card-head">
                <span class="number">03</span>
                <h3>看球时可以说的三句话</h3>
                <span class="icon">💬</span>
              </div>
              <ul id="talkLines"></ul>
            </article>

            <article class="result-card">
              <div class="card-head">
                <span class="number">04</span>
                <h3>比赛结束后朋友圈怎么发</h3>
                <span class="icon">📷</span>
              </div>
              <ul id="posts"></ul>
            </article>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel schedule-panel" id="matches">
            <div class="side-title">
              <h2>🔥 6月12-23日赛程</h2>
            </div>
            <div class="match-list" id="matchList"></div>
            <div class="pager" aria-label="赛程分页">
              <button type="button" id="prevPage" aria-label="上一页">‹</button>
              <span id="pageInfo">1 / 1</span>
              <button type="button" id="nextPage" aria-label="下一页">›</button>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>⚽ AI看球外挂</strong>
        <span>你的专属 AI 看球助理</span>
      </div>
      <nav aria-label="页脚导航">
        <button type="button" data-footer-topic="about">关于我们</button>
        <button type="button" data-footer-topic="feedback">反馈建议</button>
        <button type="button" data-footer-topic="privacy">隐私政策</button>
      </nav>
    </footer>

    <dialog class="footer-dialog" id="footerDialog" aria-labelledby="footerDialogTitle">
      <div class="footer-dialog-card">
        <button class="dialog-close" type="button" aria-label="关闭">×</button>
        <h2 id="footerDialogTitle"></h2>
        <div id="footerDialogBody"></div>
      </div>
    </dialog>

    <script src="script.js?v=6"></script>
  </body>
</html>
